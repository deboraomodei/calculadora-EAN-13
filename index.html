<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <title>Dígito verificador</title>
    <link rel="icon" type="image/ico" href="logo.ico">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
      }

      body {
        background-color: #f5f5f5;
        display: flex;
        justify-content: center;
        padding: 60px 20px;
      }

      .container {
        background-color: #ffffff;
        border-radius: 12px;
        padding: 50px;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);


        
      }

      input {
        width: 100%;
        padding: 10px 14px;
        margin-bottom: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
        outline: none;
      }

      input:focus {
        border-color: #888;
      }

      button {
        width: 100%;
        padding: 11px;
        background-color: #113c9a;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
      }

      button:hover {
        background-color: #113c9a;
      }

      #resultado {
        margin-top: 20px;
        font-size: 15px;
        color: #333;
        line-height: 1.8;
      }
      instrucoes {
  margin-top: 32px;
  border-top: 1px solid #eee;
  padding-top: 24px;
}

.instrucoes h3 {
  font-size: 14px;
  color: #888;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.instrucoes ol {
  padding-left: 20px;
}

.instrucoes li {
  font-size: 14px;
  color: #555;
  margin-bottom: 8px;
  line-height: 1.5;
}

      img {
  width: 80px;
  display: block;
  margin-left: auto;
  margin-right: auto;
  margin-bottom: 16px;
}
    </style>
  </head>
  <body>
    <div class="container">

      <img src="logo.ico" alt="Logo">

    

      <input type="text" id="campo" placeholder="Digite os 12 dígitos">
      <button onclick="calcular()">Calcular</button>

      <p id="resultado"></p>

      <div class="instrucoes">
    <h3>Como usar</h3>
    <ol>
      <li>Aponte o leitor para o código de barras</li>
      <li>O leitor vai preencher o campo automaticamente</li>
      <li>Pressione <strong>Enter</strong> ou clique em <strong>Calcular</strong></li>

    </ol>
  </div>

</div>

    </div>

    <script src="ean13.js"></script>
  </body>
</html>
